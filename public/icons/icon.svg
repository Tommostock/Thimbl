<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#C67B5C"/>
  <g transform="translate(256, 256)">
    <!-- Thimble shape -->
    <ellipse cx="0" cy="40" rx="70" ry="20" fill="#A85D3F" opacity="0.5"/>
    <rect x="-60" y="-60" width="120" height="100" rx="16" fill="#FDF8F0"/>
    <ellipse cx="0" cy="-60" rx="60" ry="28" fill="#EDE4D3"/>
    <!-- Dot pattern on thimble -->
    <circle cx="-30" cy="-30" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="0" cy="-30" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="30" cy="-30" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="-15" cy="-10" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="15" cy="-10" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="-30" cy="10" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="0" cy="10" r="5" fill="#C67B5C" opacity="0.6"/>
    <circle cx="30" cy="10" r="5" fill="#C67B5C" opacity="0.6"/>
    <!-- Needle -->
    <line x1="50" y1="-80" x2="90" y2="-120" stroke="#8BA888" stroke-width="4" stroke-linecap="round"/>
    <circle cx="95" cy="-125" r="6" fill="none" stroke="#8BA888" stroke-width="3"/>
    <!-- Thread -->
    <path d="M 95 -119 Q 110 -90 80 -70 Q 50 -50 70 -30" fill="none" stroke="#D4A0A0" stroke-width="2.5" stroke-linecap="round"/>
  </g>
